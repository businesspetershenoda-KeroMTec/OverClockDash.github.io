<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverClockDash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border: 4px solid #3d1e6d;
            border-radius: 8px;
        }
        canvas {
            display: block;
            background: #140526;
        }
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 13, 26, 0.85);
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .menu-btn {
            background: transparent;
            border: 2px solid #ff007f;
            color: #ff007f;
            padding: 12px 30px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            transition: all 0.2s ease;
            margin-top: 20px;
        }
        .menu-btn:hover {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 20px #ff007f;
        }
        #instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #a0a0c0;
            text-align: center;
            line-height: 1.6;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1>OverClockDash</h1>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="uiOverlay">
            <h2 id="menuTitle" style="color: #ff007f; font-size: 32px; text-shadow: 0 0 10px #ff007f;">SYSTEM BOOT</h2>
            <p id="menuScore" class="hidden" style="margin-top: 10px; font-size: 18px; color: #00ffcc;"></p>
            <button id="startBtn" class="menu-btn">Initialize</button>
            <div id="instructions">
                <strong>CONTROLS:</strong><br>
                Press <b>W</b> or <b>UP ARROW</b> to Jump<br>
                Press <b>S</b> or <b>DOWN ARROW</b> to Duck / Fast Fall
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay = document.getElementById('uiOverlay');
    const startBtn = document.getElementById('startBtn');
    const menuTitle = document.getElementById('menuTitle');
    const menuScore = document.getElementById('menuScore');

    // Game variables
    let gameActive = false;
    let score = 0;
    let gameSpeed = 6;
    let maxSpeed = 15;
    let acceleration = 0.001;
    let obstacles = [];
    let particles = [];
    let frameCount = 0;
    let spawnTimer = 0;

    // Environment Colors (Cyberpunk Neon Theme)
    const COLORS = {
        player: '#00ffcc',
        playerTrail: 'rgba(0, 255, 252, 0.3)',
        obstacleLow: '#ff007f',
        obstacleHigh: '#ffff00',
        ground: '#3d1e6d',
        grid: '#240c3e'
    };

    // Player Object
    const player = {
        x: 100,
        y: 300,
        baseY: 300,
        width: 40,
        height: 60,
        originalHeight: 60,
        duckHeight: 30,
        velocityY: 0,
        gravity: 0.6,
        jumpForce: -12,
        isJumping: false,
        isDucking: false,
        
        jump() {
            if (!this.isJumping && !this.isDucking) {
                this.velocityY = this.jumpForce;
                this.isJumping = true;
            }
        },
        duck(isPressed) {
            if (isPressed) {
                this.isDucking = true;
                this.height = this.duckHeight;
                if (!this.isJumping) {
                    this.y = this.baseY + (this.originalHeight - this.duckHeight);
                } else {
                    // Fast fall mechanism if pressing duck while jumping
                    this.velocityY += 1.5; 
                }
            } else {
                if (this.isDucking) {
                    this.isDucking = false;
                    this.height = this.originalHeight;
                    if (!this.isJumping) {
                        this.y = this.baseY;
                    }
                }
            }
        },
        update() {
            // Apply gravity
            this.velocityY += this.gravity;
            this.y += this.velocityY;

            // Define floor level dynamically based on ducking state
            let currentFloor = this.baseY;
            if (this.isDucking) {
                currentFloor = this.baseY + (this.originalHeight - this.duckHeight);
            }

            // Check floor collision
            if (this.y >= currentFloor) {
                this.y = currentFloor;
                this.velocityY = 0;
                this.isJumping = false;
            }
        },
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = COLORS.player;
            ctx.fillStyle = COLORS.player;
            
            // Draw player hit box
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Draw visor details
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(this.x + this.width - 12, this.y + 10, 12, 6);
            ctx.shadowBlur = 0; // Reset shadow for efficiency
        }
    };

    // Obstacle Generator
    class Obstacle {
        constructor() {
            this.type = Math.random() > 0.4 ? 'low' : 'high'; // low = jump over, high = duck under
            this.x = canvas.width;
            this.width = 25 + Math.random() * 20;
            
            if (this.type === 'low') {
                this.height = 40 + Math.random() * 30;
                this.y = 360 - this.height; // Resting on ground
                this.color = COLORS.obstacleLow;
            } else {
                this.height = 40;
                this.y = 250; // Hovering obstacle
                this.color = COLORS.obstacleHigh;
            }
        }
        update() {
            this.x -= gameSpeed;
        }
        draw() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
        }
    }

    // Particle Effect System
    function spawnParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                size: Math.random() * 4 + 2,
                alpha: 1,
                color: color
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }
        }
    }

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'KeyW' || e.code === 'ArrowUp') player.jump();
        if (e.code === 'KeyS' || e.code === 'ArrowDown') player.duck(true);
    });

    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') player.duck(false);
    });

    // Background Cyberpunk Grid Grid
    let gridOffset = 0;
    function drawBackground() {
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 2;
        
        // Draw horizontal grid lines
        for (let i = 200; i <= 360; i += 20) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }

        // Moving vertical grid lines for depth
        gridOffset = (gridOffset - gameSpeed) % 40;
        for (let i = gridOffset; i < canvas.width; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 200);
            ctx.lineTo(i, 360);
            ctx.stroke();
        }

        // Draw Ground Floor
        ctx.fillStyle = COLORS.ground;
        ctx.fillRect(0, 360, canvas.width, 40);
        ctx.fillStyle = '#ff007f';
        ctx.fillRect(0, 360, canvas.width, 2); // Glowing top floor line
    }

    // Core Collision Detection
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // Game Over Function
    function gameOver() {
        gameActive = false;
        spawnParticles(player.x + player.width/2, player.y + player.height/2, COLORS.player);
        
        // Update UI
        menuTitle.innerText = "SYSTEM CRASH";
        menuScore.innerText = `DISTANCE ACHIEVED: ${Math.floor(score)}m`;
        menuScore.classList.remove('hidden');
        startBtn.innerText = "Reboot System";
        uiOverlay.classList.remove('hidden');
    }

    // Reset loop
    function startGame() {
        score = 0;
        gameSpeed = 6;
        obstacles = [];
        particles = [];
        player.y = player.baseY;
        player.velocityY = 0;
        player.isJumping = false;
        player.isDucking = false;
        player.height = player.originalHeight;
        gameActive = true;
        uiOverlay.classList.add('hidden');
    }

    // Primary Game Loop
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();

        if (gameActive) {
            // Speed incrementation (Overclocking mechanism)
            if (gameSpeed < maxSpeed) {
                gameSpeed += acceleration;
            }

            score += gameSpeed * 0.05;

            // Spawning logic
            spawnTimer--;
            if (spawnTimer <= 0) {
                obstacles.push(new Obstacle());
                // randomize spawn frequency based on speed
                spawnTimer = 80 + Math.random() * 60 - (gameSpeed * 2);
            }

            // Update & Draw Player
            player.update();
            player.draw();

            // Handle Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.update();
                obs.draw();

                // Collision check
                if (checkCollision(player, obs)) {
                    spawnParticles(obs.x + obs.width/2, obs.y + obs.height/2, obs.color);
                    gameOver();
                }

                // Delete offscreen obstacles
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // Draw Real-time UI Text
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 16px "Courier New"';
            ctx.fillText(`SCORE: ${Math.floor(score)}m`, 20, 40);
            ctx.fillText(`SPEED: ${Math.floor(gameSpeed * 10)} MHz`, 630, 40);
        } else {
            // Even when dead, draw static states and particle updates
            player.draw();
            obstacles.forEach(o => o.draw());
        }

        updateParticles();
        requestAnimationFrame(loop);
    }

    // Event Hook
    startBtn.addEventListener('click', startGame);

    // Initial Engine Loop Call
    loop();
</script>

</body>
</html>
